<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="popup.css">
    <title>Token Rank</title>
  </head>
  <body>
    <main class="popup">
      <header class="topbar">
        <div>
          <p class="eyebrow">X Profile Badge</p>
          <h1>Token Rank</h1>
          <p id="status">Codex 未连接</p>
        </div>
        <span class="mark">𝕏</span>
      </header>

      <section class="profile-card" aria-label="X profile badge preview">
        <div class="cover"></div>
        <div class="profile-body">
          <div class="avatar" aria-hidden="true"></div>
          <div class="identity">
            <strong>烂活Web3 <span class="verified">✓</span></strong>
            <span>@shngyo1taczzzz</span>
          </div>

          <div class="member-card">
            <span class="member-mark">✳</span>
            <div>
              <strong>Lighthouse 成员</strong>
              <span>TIER D · 烂活Web3</span>
            </div>
          </div>

          <section class="rank" id="rank" hidden>
            <div class="rank-main">
              <span class="rank-mark">◈</span>
              <strong id="tokens">0 tokens</strong>
              <span class="proof-label">Codex Verified</span>
            </div>
            <div class="rank-meta">
              <span>Codex</span>
              <div class="glyphs" id="glyphs"></div>
              <span id="updated"></span>
            </div>
          </section>
        </div>
      </section>

      <section class="claim">
        <label for="xHandle">X handle</label>
        <input id="xHandle" type="text" placeholder="shngyo1taczzzz" autocomplete="off">
      </section>

      <div class="actions">
        <button id="upload" type="button">上传当前页面</button>
        <button id="claim" type="button" class="secondary">生成备用 Prompt</button>
        <button id="connect" type="button">Connect Codex</button>
        <button id="read" type="button" class="secondary">仅本地读取</button>
      </div>

      <textarea id="prompt" readonly hidden></textarea>

      <p class="note">
        打开 Codex 统计页后点击上传，插件只读取当前页面可见的近 3 个月累计 token。
      </p>
    </main>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
