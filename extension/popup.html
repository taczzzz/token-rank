<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="popup.css">
    <title>Token Rank</title>
  </head>
  <body>
    <main class="popup">
      <header>
        <div>
          <h1>Token Rank</h1>
          <p id="status">Codex 未连接</p>
        </div>
        <span class="mark">◈</span>
      </header>

      <section class="rank" id="rank" hidden>
        <div class="glyphs" id="glyphs"></div>
        <strong id="tokens">0 tokens</strong>
        <span id="updated"></span>
      </section>

      <section class="claim">
        <label for="xHandle">X handle</label>
        <input id="xHandle" type="text" placeholder="shngyo1taczzzz" autocomplete="off">
      </section>

      <div class="actions">
        <button id="claim" type="button">生成上传 Prompt</button>
        <button id="connect" type="button">Connect Codex</button>
        <button id="read" type="button" class="secondary">读取当前页面</button>
      </div>

      <textarea id="prompt" readonly hidden></textarea>

      <p class="note">
        读取只发生在你打开的 Codex 页面里，插件会把可见的近 3 个月累计 token 数保存到本机。
      </p>
    </main>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
